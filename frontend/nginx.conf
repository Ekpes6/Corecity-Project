## ─────────────────────────────────────────────────────────────────────────────
## nginx.conf  — with rate limiting
## Replace: frontend/nginx.conf
## ─────────────────────────────────────────────────────────────────────────────
##
## Two rate-limit zones are defined at the http level (handled by docker-compose
## or the parent nginx config). If this file is used as a standalone server
## block inside /etc/nginx/conf.d/, wrap the limit_req_zone directives in an
## http {} block in /etc/nginx/nginx.conf instead.
##
## If you are using this as the full nginx.conf (single-file deployment),
## uncomment the http {} wrapper below and remove the outer comment markers.
##
## ─────────────────────────────────────────────────────────────────────────────

## Uncomment if this is your top-level nginx.conf:
# http {
#   limit_req_zone $binary_remote_addr zone=auth_limit:10m    rate=5r/m;
#   limit_req_zone $binary_remote_addr zone=api_limit:10m     rate=30r/s;
#   include /etc/nginx/conf.d/*.conf;
# }

## ─── Rate limit zones (add to the http {} block in nginx.conf) ───────────────
##
##  auth_limit:  5 requests/minute per IP on auth endpoints (login, register).
##               A normal user logs in once; this stops brute-force attacks.
##
##  api_limit:   30 requests/second per IP on all other API calls.
##               Generous for real users, stops trivial scrapers/DoS.
##
## These are declared at the http{} level — keep them in nginx.conf,
## NOT in this server block file.

limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    ## ─── Static assets ────────────────────────────────────────────────────
    location = /manifest.json {
        try_files $uri =404;
    }

    location ~* \.(?:css|js|map|json|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    ## ─── Auth endpoints — strict rate limit ──────────────────────────────
    ## 5 requests/minute with a small burst of 2.
    ## Returns 429 (Too Many Requests) when the limit is exceeded.
    location ~ ^/api/v1/auth/(login|register) {
        limit_req zone=auth_limit burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://api-gateway:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    ## ─── All other API calls — general rate limit ────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        limit_req_status 429;

        proxy_pass http://api-gateway:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    ## ─── Frontend SPA fallback ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    ## ─── Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript;
    gzip_min_length 1024;
    gzip_vary on;

    ## ─── Security headers ─────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "DENY"           always;
    add_header Referrer-Policy         "strict-origin"  always;
}