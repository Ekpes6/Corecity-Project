## ─────────────────────────────────────────────────────────────────────────────
## nginx.conf  — complete standalone config for the corecity frontend container
## Copied to /etc/nginx/nginx.conf by the Dockerfile.
## ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    server_tokens off;

    ## ─── Rate limit zones ─────────────────────────────────────────────────
    ##  auth_limit : 5 req/min per IP — stops brute-force on login/register
    ##  api_limit  : 30 req/s per IP  — stops trivial scrapers / DoS
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    ## ─── Static assets ────────────────────────────────────────────────────
    location = /manifest.json {
        try_files $uri =404;
    }

    location ~* \.(?:css|js|map|json|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    ## ─── Auth endpoints — strict rate limit ──────────────────────────────
    ## 5 requests/minute with a small burst of 2.
    ## Returns 429 (Too Many Requests) when the limit is exceeded.
    location ~ ^/api/v1/auth/(login|register) {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://api-gateway:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    ## ─── All other API calls — general rate limit ────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        limit_req_status 429;

        proxy_pass http://api-gateway:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    ## ─── Frontend SPA fallback ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    ## ─── Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript;
    gzip_min_length 1024;
    gzip_vary on;

    ## ─── Security headers ─────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "DENY"           always;
    add_header Referrer-Policy         "strict-origin"  always;
}

} # end http