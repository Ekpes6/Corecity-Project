services:
  # ─── Database ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: corecity-mysql
    environment:
      MYSQL_ROOT_PASSWORD: corecity_root
      MYSQL_DATABASE: corecity_db
      MYSQL_USER: corecity_user
      MYSQL_PASSWORD: corecity_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "corecity_user", "-pcorecity_pass"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    networks:
      - corecity-network

  # ─── Message Broker ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: corecity-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - corecity-network

  # ─── API Gateway ────────────────────────────────────────────
  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: corecity-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - USER_SERVICE_URI=http://user-service:8081
      - PROPERTY_SERVICE_URI=http://property-service:8082
      - FILE_SERVICE_URI=http://file-service:8083
      - TRANSACTION_SERVICE_URI=http://transaction-service:8084
      - NOTIFICATION_SERVICE_URI=http://notification-service:8085
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - corecity-network

  # ─── Microservices ──────────────────────────────────────────
  user-service:
    build:
      context: ./backend
      dockerfile: user-service/Dockerfile
    container_name: corecity-user-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/corecity_db
      - SPRING_DATASOURCE_USERNAME=corecity_user
      - SPRING_DATASOURCE_PASSWORD=corecity_pass
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - corecity-network

  property-service:
    build:
      context: ./backend
      dockerfile: property-service/Dockerfile
    container_name: corecity-property-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/corecity_db
      - SPRING_DATASOURCE_USERNAME=corecity_user
      - SPRING_DATASOURCE_PASSWORD=corecity_pass
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - corecity-network

  file-service:
    build:
      context: ./backend
      dockerfile: file-service/Dockerfile
    container_name: corecity-file-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/corecity_db
      - SPRING_DATASOURCE_USERNAME=corecity_user
      - SPRING_DATASOURCE_PASSWORD=corecity_pass
      - FILE_UPLOAD_DIR=/uploads
    volumes:
      - file_uploads:/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - corecity-network

  transaction-service:
    build:
      context: ./backend
      dockerfile: transaction-service/Dockerfile
    container_name: corecity-transaction-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/corecity_db
      - SPRING_DATASOURCE_USERNAME=corecity_user
      - SPRING_DATASOURCE_PASSWORD=corecity_pass
      - SPRING_RABBITMQ_HOST=rabbitmq
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - corecity-network

  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    container_name: corecity-notification-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - TERMII_API_KEY=${TERMII_API_KEY}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - corecity-network

  # ─── Frontend ───────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: corecity-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - corecity-network

volumes:
  mysql_data:
  file_uploads:

networks:
  corecity-network:
    driver: bridge
