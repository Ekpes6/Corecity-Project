  frontend:
    build: ./frontend
    container_name: corecity-frontend
    restart: on-failure
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - corecity-network

volumes:
  mysql_data:
  rabbitmq_data:
  file_uploads:

networks:
  corecity-network:
    driver: bridge