server:
  port: 8084

spring:
  application:
    name: transaction-service
  datasource:
    url: jdbc:mysql://mysql:3306/corecity_db?useSSL=false&serverTimezone=Africa/Lagos
    username: corecity_user
    password: corecity_pass
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  rabbitmq:
    host: rabbitmq
    port: 5672

paystack:
  secret-key: ${PAYSTACK_SECRET_KEY:sk_test_your_paystack_secret_key_here}
