server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**
          filters:
            - name: AuthFilter
              args:
                excludedPaths: /api/v1/auth/login,/api/v1/auth/register,/api/v1/auth/refresh,/api/v1/auth/health

        - id: property-service
          uri: ${PROPERTY_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/properties/**, /api/v1/states/**, /api/v1/enquiries/**
          filters:
            - name: AuthFilter

        - id: file-service
          uri: ${FILE_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/files/**
          filters:
            - name: AuthFilter

        - id: transaction-service
          uri: ${TRANSACTION_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/v1/transactions/**
          filters:
            - name: AuthFilter
              args:
                excludedPaths: /api/v1/transactions/verify,/api/v1/transactions/webhook/paystack

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - name: AuthFilter

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "https://corecity.com.ng"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

jwt:
  secret: ${JWT_SECRET:corecityNigeriaSecretKey2024VeryLongAndSecure!}
  expiration: 86400000  # 24 hours

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
