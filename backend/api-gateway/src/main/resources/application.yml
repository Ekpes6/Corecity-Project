server:
  port: 8080

spring:
  application:
    name: api-gateway
  # Increase the WebFlux codec buffer limit from the default 256 KB to 200 MB.
  # Without this, any filter (e.g. Retry on non-GET routes) that needs to buffer
  # a large request body will hit DataBufferLimitException and may forward a
  # truncated or empty body to the downstream service.
  codec:
    max-in-memory-size: 209715200   # 200 MB
  cloud:
    gateway:
      httpclient:
        connect-timeout: 10000
        response-timeout: 60s
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**, /api/v1/subscriptions/**, /api/v1/agents/**
          # Give user-service up to 90 s — JVM cold-start + Paystack HTTP call can
          # exceed the global 60 s, causing a gateway timeout that leaves an orphan
          # PENDING wallet record in the DB while the user sees a 503.
          metadata:
            response-timeout: 90000
          filters:
            - name: AuthFilter
              args:
                excludedPaths: /api/v1/auth/login,/api/v1/auth/register,/api/v1/auth/refresh,/api/v1/auth/health,/api/v1/users/check-phone,/api/v1/subscriptions/plans,/api/v1/agents/*/reputation,/api/v1/subscriptions/webhook/paystack,/api/v1/users/me/wallet/webhook
            - name: CircuitBreaker
              args:
                name: user-service-cb
                fallbackUri: forward:/fallback
            # Retry once on connection errors and 502/503/504 before the circuit
            # breaker counts the failure. Covers JVM cold-start where user-service
            # isn't listening yet on the first request after a deploy/restart.
            - name: Retry
              args:
                retries: 2
                statuses: SERVICE_UNAVAILABLE,BAD_GATEWAY,GATEWAY_TIMEOUT
                methods: GET,POST,PUT,DELETE,PATCH
                backoff:
                  firstBackoff: 1000ms
                  maxBackoff: 3000ms
                  factor: 2
                  basedOnPreviousValue: false

        - id: property-service
          uri: ${PROPERTY_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/properties/**, /api/v1/states/**, /api/v1/enquiries/**, /api/v1/reservations/**
          filters:
            - name: AuthFilter
              args:
                excludedPaths: /api/v1/reservations/webhook/paystack
            - name: CircuitBreaker
              args:
                name: property-service-cb
                fallbackUri: forward:/fallback
            - name: Retry
              args:
                retries: 2
                statuses: SERVICE_UNAVAILABLE,BAD_GATEWAY,GATEWAY_TIMEOUT
                methods: GET,POST,PUT,DELETE,PATCH
                backoff:
                  firstBackoff: 1000ms
                  maxBackoff: 3000ms
                  factor: 2
                  basedOnPreviousValue: false

        - id: file-service
          uri: ${FILE_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/files/**
          filters:
            - name: AuthFilter
            - name: CircuitBreaker
              args:
                name: file-service-cb
                fallbackUri: forward:/fallback
            # Only retry GET requests for file-service.
            # POST (upload) and DELETE cannot be safely retried: the Retry filter
            # caches the entire request body in memory to replay it, which (a) fails
            # silently for files larger than spring.codec.max-in-memory-size, causing
            # Tomcat to receive an empty body and throw MultipartException, and (b)
            # would re-upload the same file if a retry succeeds after a partial write.
            - name: Retry
              args:
                retries: 2
                statuses: SERVICE_UNAVAILABLE,BAD_GATEWAY,GATEWAY_TIMEOUT
                methods: GET
                backoff:
                  firstBackoff: 1000ms
                  maxBackoff: 3000ms
                  factor: 2
                  basedOnPreviousValue: false
          # File uploads to R2 can take several minutes for large batches —
          # override the global 60s response-timeout for this route only.
          metadata:
            response-timeout: 300000

        - id: transaction-service
          uri: ${TRANSACTION_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/v1/transactions/**, /api/v1/commissions/**
          filters:
            - name: AuthFilter
              args:
                excludedPaths: /api/v1/transactions/verify,/api/v1/transactions/webhook/paystack
            - name: CircuitBreaker
              args:
                name: transaction-service-cb
                fallbackUri: forward:/fallback
            - name: Retry
              args:
                retries: 2
                statuses: SERVICE_UNAVAILABLE,BAD_GATEWAY,GATEWAY_TIMEOUT
                methods: GET,POST,PUT,DELETE,PATCH
                backoff:
                  firstBackoff: 1000ms
                  maxBackoff: 3000ms
                  factor: 2
                  basedOnPreviousValue: false

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - name: AuthFilter
            - name: CircuitBreaker
              args:
                name: notification-service-cb
                fallbackUri: forward:/fallback
            - name: Retry
              args:
                retries: 2
                statuses: SERVICE_UNAVAILABLE,BAD_GATEWAY,GATEWAY_TIMEOUT
                methods: GET,POST,PUT,DELETE,PATCH
                backoff:
                  firstBackoff: 1000ms
                  maxBackoff: 3000ms
                  factor: 2
                  basedOnPreviousValue: false

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "https://corecity.com.ng"
              - "https://www.corecity.com.ng"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

jwt:
  # No default — the application will refuse to start if JWT_SECRET is absent.
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24 hours

resilience4j:
  # Spring Cloud wraps every CircuitBreaker filter call with a TimeLimiter as well as
  # a circuit breaker.  The default timeoutDuration is 4 s — far too short for file
  # uploads that must watermark an image then transfer it to Cloudflare R2.
  # Configure per-instance timeouts so that each service gets an appropriate limit.
  timelimiter:
    configs:
      default:
        # 30 s is generous for normal API calls (login, property CRUD, etc.)
        timeoutDuration: 30s
        cancelRunningFuture: true
    instances:
      file-service-cb:
        # 5 minutes — matches the Netty response-timeout on the file-service route.
        # Watermarking + R2 upload for a 10 MB image can easily take > 30 s.
        timeoutDuration: 300s
        cancelRunningFuture: true
      user-service-cb:
        # Paystack HTTP call on wallet top-up can take 15–20 s
        timeoutDuration: 90s
        cancelRunningFuture: true
      transaction-service-cb:
        # Wallet payment calls property-service internally with a 15 s timeout,
        # so the full initiate request can take up to ~16 s.  Give it 35 s headroom.
        timeoutDuration: 35s
        cancelRunningFuture: true
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 60
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.cloud.gateway.support.NotFoundException
    instances:
      user-service-cb:
        baseConfig: default
      property-service-cb:
        baseConfig: default
      file-service-cb:
        baseConfig: default
      transaction-service-cb:
        baseConfig: default
      notification-service-cb:
        baseConfig: default

management:
  server:
    port: 9090  # Not published in docker-compose — actuator unreachable from outside
  endpoints:
    web:
      exposure:
        include: health
