server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**
          filters:
            - name: AuthFilter
              args:
                excludedPaths: /api/v1/auth/login,/api/v1/auth/register,/api/v1/auth/refresh

        - id: property-service
          uri: http://property-service:8082
          predicates:
            - Path=/api/v1/properties/**, /api/v1/states/**, /api/v1/enquiries/**
          filters:
            - name: AuthFilter

        - id: file-service
          uri: http://file-service:8083
          predicates:
            - Path=/api/v1/files/**
          filters:
            - name: AuthFilter

        - id: transaction-service
          uri: http://transaction-service:8084
          predicates:
            - Path=/api/v1/transactions/**
          filters:
            - name: AuthFilter

        - id: notification-service
          uri: http://notification-service:8085
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - name: AuthFilter

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "https://corecity.com.ng"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

jwt:
  secret: ${JWT_SECRET:corecityNigeriaSecretKey2024VeryLongAndSecure!}
  expiration: 86400000  # 24 hours

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
