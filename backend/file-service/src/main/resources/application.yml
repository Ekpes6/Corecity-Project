server:
  port: 8083

spring:
  application:
    name: file-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/corecity_db?allowPublicKeyRetrieval=true&serverTimezone=Africa/Lagos}
    username: ${SPRING_DATASOURCE_USERNAME:corecity_user}
    password: ${SPRING_DATASOURCE_PASSWORD:corecity_pass}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# S3 / Cloudflare R2 storage
# Set S3_ENDPOINT to your R2 account URL for Cloudflare R2:
#   https://{ACCOUNT_ID}.r2.cloudflarestorage.com
# Leave S3_ENDPOINT blank to use AWS S3.
cloud:
  aws:
    credentials:
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
    s3:
      bucket: ${S3_BUCKET:corecity-files}
      endpoint: ${S3_ENDPOINT:}
      region: ${S3_REGION:auto}
      # Public base URL for returned file links (e.g. https://pub-xxx.r2.dev or https://files.yourdomain.com)
      public-base-url: ${S3_PUBLIC_BASE_URL:http://localhost:8083/files}
