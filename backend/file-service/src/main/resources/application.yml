server:
  port: 8083

spring:
  application:
    name: file-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/corecity_db?useSSL=false&serverTimezone=Africa/Lagos}
    username: ${SPRING_DATASOURCE_USERNAME:corecity_user}
    password: ${SPRING_DATASOURCE_PASSWORD:corecity_pass}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

file:
  upload-dir: ${FILE_UPLOAD_DIR:/uploads}
  base-url: ${FILE_BASE_URL:http://localhost:8083/api/v1/files/serve}
