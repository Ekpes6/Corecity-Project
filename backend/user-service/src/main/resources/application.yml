server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/corecity_db?allowPublicKeyRetrieval=true&serverTimezone=Africa/Lagos}
    username: ${SPRING_DATASOURCE_USERNAME:corecity_user}
    password: ${SPRING_DATASOURCE_PASSWORD:corecity_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}
    connection-timeout: 10000
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 5000
          max-attempts: 10
          multiplier: 2.0
          max-interval: 60000
        default-requeue-rejected: false
    template:
      retry:
        enabled: true
        initial-interval: 2000
        max-attempts: 5
        multiplier: 2.0

jwt:
  # No default — the application will refuse to start if JWT_SECRET is absent.
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 2592000000  # 30 days

encryption:
  # Base64-encoded 32-byte AES-256 key. Generate with:
  #   openssl rand -base64 32
  key: ${ENCRYPTION_KEY}

paystack:
  secret-key: ${PAYSTACK_SECRET_KEY}
  callback-url: ${PAYSTACK_CALLBACK_URL:https://corecity.com.ng/payment/verify}

management:
  server:
    port: 9091  # Not published in docker-compose — actuator unreachable from outside
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.corecity: ${LOGGING_LEVEL_COM_CORECITY:INFO}
    org.springframework: WARN