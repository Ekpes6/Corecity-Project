server:
  port: 8082
  # Do NOT expose exception class names or stack traces to API consumers.
  # Spring Boot defaults are already safe (include-exception=false, include-message=never)
  # so we simply remove the dangerous overrides that were here.

spring:
  application:
    name: property-service
  backgroundpreinitializer:
    ignore: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/corecity_db?allowPublicKeyRetrieval=true&serverTimezone=Africa/Lagos}
    username: ${SPRING_DATASOURCE_USERNAME:corecity_user}
    password: ${SPRING_DATASOURCE_PASSWORD:corecity_pass}
    hikari:
      connection-timeout: 10000
      validation-timeout: 5000
      max-lifetime: 240000
      keepalive-time: 120000
      minimum-idle: 2
      maximum-pool-size: 20
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}