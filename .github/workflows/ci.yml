name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend: compile + test ─────────────────────────────────────────────
  test-backend:
    name: Backend tests (Java 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run all backend unit tests
        run: mvn -f backend/pom.xml --batch-mode -Dsurefire.failIfNoSpecifiedTests=false test

  # ─── Frontend: install + build + test ────────────────────────────────────
  test-frontend:
    name: Frontend tests (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build React app
        run: npm run build --prefix frontend
        env:
          CI: false   # treat warnings as warnings, not errors

      - name: Run frontend tests
        run: npm test --prefix frontend -- --watchAll=false --passWithNoTests
        env:
          CI: true

  # ─── Docker images: build + push (main branch only) ──────────────────────
  build-and-push:
    name: Build & push Docker images
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - api-gateway
          - user-service
          - property-service
          - file-service
          - transaction-service
          - notification-service

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/corecity-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/corecity-${{ matrix.service }}:${{ github.sha }}

  build-and-push-frontend:
    name: Build & push frontend image
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/corecity-frontend:latest
            ghcr.io/${{ github.repository_owner }}/corecity-frontend:${{ github.sha }}
