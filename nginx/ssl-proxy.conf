# ─── SSL/TLS Terminating Reverse Proxy ───────────────────────────────────────
#
# Place TLS certificates at:
#   ./nginx/certs/fullchain.pem   (certificate + intermediate chain)
#   ./nginx/certs/privkey.pem     (private key)
#
# Recommended: obtain certificates via Let's Encrypt / Certbot:
#   certbot certonly --standalone -d corecity.com.ng -d www.corecity.com.ng
#   cp /etc/letsencrypt/live/corecity.com.ng/fullchain.pem ./nginx/certs/
#   cp /etc/letsencrypt/live/corecity.com.ng/privkey.pem   ./nginx/certs/
#
# ─────────────────────────────────────────────────────────────────────────────

upstream frontend_upstream {
    server frontend:80;
    keepalive 32;
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ─── HTTPS termination ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"    always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "";
    }
}
